name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Create index page
        run: |
          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Senior Engineer Advisor - Coding Test Results</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eaeaea;
                      min-height: 100vh;
                      padding: 40px 20px;
                  }
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                  }
                  h1 {
                      text-align: center;
                      font-size: 2.5rem;
                      margin-bottom: 10px;
                      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                  }
                  .subtitle {
                      text-align: center;
                      color: #888;
                      margin-bottom: 40px;
                  }
                  .test-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                      gap: 30px;
                      margin-bottom: 40px;
                  }
                  .test-card {
                      background: rgba(255,255,255,0.05);
                      border-radius: 16px;
                      padding: 30px;
                      border: 1px solid rgba(255,255,255,0.1);
                      transition: transform 0.3s, box-shadow 0.3s;
                  }
                  .test-card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
                  }
                  .test-card h2 {
                      font-size: 1.5rem;
                      margin-bottom: 15px;
                      color: #00d4ff;
                  }
                  .test-card.test-b h2 {
                      color: #ff6b6b;
                  }
                  .meta {
                      display: flex;
                      gap: 20px;
                      margin-bottom: 20px;
                      flex-wrap: wrap;
                  }
                  .meta-item {
                      background: rgba(0,0,0,0.3);
                      padding: 8px 16px;
                      border-radius: 8px;
                      font-size: 0.9rem;
                  }
                  .meta-item span {
                      color: #888;
                  }
                  p {
                      line-height: 1.6;
                      margin-bottom: 20px;
                      color: #ccc;
                  }
                  .btn {
                      display: inline-block;
                      padding: 12px 24px;
                      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
                      color: white;
                      text-decoration: none;
                      border-radius: 8px;
                      font-weight: 600;
                      transition: opacity 0.3s;
                  }
                  .btn:hover {
                      opacity: 0.9;
                  }
                  .btn-secondary {
                      background: transparent;
                      border: 2px solid #00d4ff;
                      margin-left: 10px;
                  }
                  .comparison {
                      background: rgba(255,255,255,0.05);
                      border-radius: 16px;
                      padding: 30px;
                      margin-top: 40px;
                  }
                  .comparison h2 {
                      margin-bottom: 20px;
                      color: #ffd700;
                  }
                  table {
                      width: 100%;
                      border-collapse: collapse;
                      margin-top: 20px;
                  }
                  th, td {
                      padding: 12px;
                      text-align: left;
                      border-bottom: 1px solid rgba(255,255,255,0.1);
                  }
                  th {
                      color: #888;
                      font-weight: 500;
                  }
                  footer {
                      text-align: center;
                      margin-top: 60px;
                      padding-top: 40px;
                      border-top: 1px solid rgba(255,255,255,0.1);
                      color: #666;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🎯 Coding Test Results</h1>
                  <p class="subtitle">Senior Engineer Advisor - Voxel Gun Simulator Comparison</p>
                  
                  <div class="test-grid">
                      <div class="test-card">
                          <h2>✨ Test A: With Advisor</h2>
                          <div class="meta">
                              <div class="meta-item"><span>Time:</span> 22m 37s</div>
                              <div class="meta-item"><span>Files:</span> 22</div>
                              <div class="meta-item"><span>Lines:</span> 2,371</div>
                          </div>
                          <p>Architectural guidance from Claude Opus 4.6 with 5-layer structured approach. Full specialist assignment via Agency Agents.</p>
                          <a href="./test_a_app/index.html" class="btn">Launch App</a>
                          <a href="./COMPARISON_REPORT.md" class="btn btn-secondary">View Report</a>
                      </div>
                      
                      <div class="test-card test-b">
                          <h2>🚀 Test B: Direct Implementation</h2>
                          <div class="meta">
                              <div class="meta-item"><span>Time:</span> 6m</div>
                              <div class="meta-item"><span>Files:</span> 5</div>
                              <div class="meta-item"><span>Size:</span> ~54KB</div>
                          </div>
                          <p>Single-pass generation with specialist prompts. Rapid prototyping approach without architectural planning phase.</p>
                          <a href="./test_b_app/index.html" class="btn">Launch App</a>
                          <a href="./COMPARISON_REPORT.md" class="btn btn-secondary">View Report</a>
                      </div>
                  </div>
                  
                  <div class="comparison">
                      <h2>📊 Quick Comparison</h2>
                      <table>
                          <tr>
                              <th>Metric</th>
                              <th>Test A (With Advisor)</th>
                              <th>Test B (Direct)</th>
                          </tr>
                          <tr>
                              <td>Execution Time</td>
                              <td>22m 37s</td>
                              <td>6m</td>
                          </tr>
                          <tr>
                              <td>Architecture</td>
                              <td>5-Layer Structured</td>
                              <td>Integrated</td>
                          </tr>
                          <tr>
                              <td>Build System</td>
                              <td>Vite + ES Modules</td>
                              <td>CDN (Three.js)</td>
                          </tr>
                          <tr>
                              <td>Best For</td>
                              <td>Production / Long-term</td>
                              <td>Prototyping / MVP</td>
                          </tr>
                      </table>
                  </div>
                  
                  <footer>
                      <p>Generated with Senior Engineer Advisor v3</p>
                      <p>Test Date: 2026-05-09</p>
                  </footer>
              </div>
          </body>
          </html>
          EOF
          
          # Copy test apps
          cp -r tests/voxel-gun/test_a_app _site/
          cp -r tests/voxel-gun/test_b_app _site/
          cp tests/voxel-gun/COMPARISON_REPORT.md _site/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
