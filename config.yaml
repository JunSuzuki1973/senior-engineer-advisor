# Senior Engineer Advisor — Static configuration
# Runtime values are in .env. This file stores structural settings.

version: "4.0"

orchestrator:
  complexity_threshold: 0.5   # override with COMPLEXITY_THRESHOLD env var
  advice_depth: 3             # 1-5, override with ADVICE_DEPTH env var
  auto_save_wiki: true        # save results to wiki by default

wiki:
  threshold: 0.25             # keyword similarity threshold for cache hit
  max_results: 3              # return top N results (future: semantic search)
  rewrite_on_update: true     # Karpathy pattern: overwrite, don't append

specialists:
  # Core specialists shipped with this repo
  builtin:
    - security
    - database
    - api
    - performance
    - devops
    - frontend
    - backend
    - ml
  # Extended specialists from agency-agents (run scripts/convert/agency-agents.sh)
  extended_dir: agents/

code_review:
  enabled: false              # post-implementation review (future feature)
  trigger_on_complexity: 0.8

tools:
  # Supported AI coding tool adapters
  supported:
    - claude-code
    - opencode
    - kilo
    - openclaw
