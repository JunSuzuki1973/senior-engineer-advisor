<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ボクセルアート モデルガン分解シミュレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f1a;--panel:#0d1525;--accent:#00d4ff;--accent2:#ff6b35;--muted:#6b7c9a;--card:#111b2e}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#e8f0ff;overflow:hidden}
.app{display:flex;height:100%}
#canvas-container{flex:1;position:relative;background:linear-gradient(135deg,#080d18 0%,#0a1428 50%,#0d1830 100%)}
canvas{display:block}
.overlay{position:absolute;top:16px;left:16px;background:rgba(13,21,37,0.92);padding:16px;border-radius:12px;border:1px solid rgba(0,212,255,0.15);backdrop-filter:blur(10px);max-width:280px}
.overlay h1{font-size:16px;color:var(--accent);margin-bottom:4px}
.overlay .meta{font-size:12px;color:var(--muted);margin-bottom:12px}
.step-info{background:rgba(0,212,255,0.05);padding:12px;border-radius:8px;margin-bottom:12px}
.step-info .step-num{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.step-info .step-title{font-size:14px;font-weight:600;margin:4px 0}
.step-info .step-desc{font-size:12px;color:var(--muted);line-height:1.5}
.controls{display:flex;gap:8px;flex-wrap:wrap}
button{background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(0,212,255,0.05));border:1px solid rgba(0,212,255,0.3);color:var(--accent);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.2s}
button:hover{background:linear-gradient(135deg,rgba(0,212,255,0.25),rgba(0,212,255,0.1));transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.active{background:var(--accent);color:#000;font-weight:600}
button:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-secondary{background:rgba(255,107,53,0.1);border-color:rgba(255,107,53,0.3);color:var(--accent2)}
.btn-secondary:hover{background:rgba(255,107,53,0.2)}
.sidebar{width:320px;background:var(--panel);border-left:1px solid rgba(0,212,255,0.1);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(0,212,255,0.1)}
.sidebar-header h2{font-size:14px;color:var(--accent);margin-bottom:4px}
.progress-bar{height:4px;background:rgba(0,212,255,0.1);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s}
.steps-list{flex:1;overflow-y:auto;padding:12px}
.step-item{padding:12px;border-radius:8px;margin-bottom:8px;background:rgba(255,255,255,0.02);border:1px solid transparent;cursor:pointer;transition:all 0.2s}
.step-item:hover{background:rgba(0,212,255,0.05)}
.step-item.active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3)}
.step-item.completed{border-color:rgba(0,255,136,0.3)}
.step-item .step-num{font-size:11px;color:var(--muted)}
.step-item.active .step-num{color:var(--accent)}
.step-item .step-name{font-size:13px;margin-top:2px}
.parts-panel{border-top:1px solid rgba(0,212,255,0.1);padding:12px}
.parts-panel h3{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.part-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;margin-bottom:4px;cursor:pointer;transition:all 0.2s}
.part-item:hover{background:rgba(255,255,255,0.03)}
.part-item.selected{background:rgba(0,212,255,0.1)}
.part-color{width:12px;height:12px;border-radius:3px}
.part-name{font-size:12px;flex:1}
.part-status{font-size:10px;color:var(--muted)}
.detail-panel{background:rgba(0,0,0,0.3);padding:12px;margin-top:8px;border-radius:8px}
.detail-panel h4{font-size:13px;color:#fff;margin-bottom:6px}
.detail-panel p{font-size:12px;color:var(--muted);line-height:1.5}
.camera-hint{position:absolute;bottom:16px;left:16px;font-size:11px;color:var(--muted);background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:6px}
@media(max-width:900px){.app{flex-direction:column}.sidebar{width:100%;height:40vh}}
</style>
</head>
<body>
<div class="app">
  <div id="canvas-container">
    <div class="overlay">
      <h1>モデルガン分解シミュレーター</h1>
      <div class="meta">ボクセルアートスタイル / 教育目的</div>
      <div class="step-info">
        <div class="step-num">Step <span id="currentStep">1</span> / <span id="totalSteps">8</span></div>
        <div class="step-title" id="stepTitle">スライドの取り外し</div>
        <div class="step-desc" id="stepDesc">スライドを後方に引いて取り外します。</div>
      </div>
      <div class="controls">
        <button id="prevBtn" disabled>◀ 前へ</button>
        <button id="nextBtn">次へ ▶</button>
        <button id="modeBtn" class="btn-secondary">組立モード</button>
        <button id="resetBtn" class="btn-secondary">リセット</button>
      </div>
    </div>
    <div class="camera-hint">🖱️ ドラッグ: 回転 | スクロール: ズーム | 右クリック: パン</div>
  </div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>分解手順</h2>
      <div style="font-size:12px;color:var(--muted);margin-top:4px" id="modeLabel">分解モード</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="steps-list" id="stepsList"></div>
    <div class="parts-panel">
      <h3>パーツ一覧</h3>
      <div id="partsList"></div>
      <div class="detail-panel" id="detailPanel">
        <h4 id="detailTitle">パーツを選択</h4>
        <p id="detailDesc">詳細情報を表示するにはパーツをクリックしてください。</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
"use strict";

const PARTS_DATA = [
  { id: "slide", name: "スライド", role: "上部の可動部品。発射時に後退し、次の弾をチャンバーに送り込む。", color: 0x3a4a5c },
  { id: "barrel", name: "バレル（銃身）", role: "弾丸が通過する管状の部品。精度と命中精度に影響する。", color: 0x5a6a7c },
  { id: "frame", name: "フレーム", role: "主要な構造体。すべてのパーツを保持する基盤となる。", color: 0x2a3a4c },
  { id: "trigger", name: "トリガー（引金）", role: "発射機構を作動させるレバー。シアを解除してハンマーを解放する。", color: 0x4a5a6c },
  { id: "hammer", name: "ハンマー", role: "撃針を打撃して弾丸を発火させる部品。", color: 0x3a3a3a },
  { id: "grip", name: "グリップ", role: "握り部分。手で保持するための部品。マガジンを収める場所でもある。", color: 0x2a2a2a },
  { id: "magazine", name: "マガジン（弾倉）", role: "弾丸を格納し、スプリングで順次供給する部品。", color: 0x3a3a3a },
  { id: "recoil_spring", name: "リコイルスプリング", role: "スライドの後退エネルギーを吸収し、前進させる復帰バネ。", color: 0xc0c0c0 },
  { id: "guide_rod", name: "ガイドロッド", role: "リコイルスプリングを支持し、動作を安定させる棒状の部品。", color: 0x808080 },
  { id: "sights", name: "サイト（照準器）", role: "照準を合わせるためのフロントサイトとリアサイト。", color: 0x1a1a1a }
];

const DISASSEMBLY_STEPS = [
  { id: 1, title: "マガジンの取り外し", desc: "マガジンキャッチを押してマガジンを取り外します。", partId: "magazine", explode: { y: -2.5 } },
  { id: 2, title: "スライドの取り外し", desc: "スライドリリースレバーを下げ、スライドを前方に引き抜きます。", partId: "slide", explode: { x: 0, y: 1.5, z: 0 } },
  { id: 3, title: "リコイルスプリングの取り外し", desc: "バレルの下からリコイルスプリングとガイドロッドを取り外します。", partId: "recoil_spring", explode: { z: 2 } },
  { id: 4, title: "ガイドロッドの取り外し", desc: "ガイドロッドをスライドから引き抜きます。", partId: "guide_rod", explode: { z: 2.5 } },
  { id: 5, title: "バレルの取り外し", desc: "バレルをスライドアセンブリから取り外します。", partId: "barrel", explode: { x: 1.5, z: 1.5 } },
  { id: 6, title: "サイトの確認", desc: "フロントサイトとリアサイトの位置を確認します。", partId: "sights", explode: { y: 1.2 } },
  { id: 7, title: "トリガーメカニズムの確認", desc: "トリガーとハンマーの連動を確認します。", partId: "trigger", explode: { y: -0.8 } },
  { id: 8, title: "グリップの取り外し", desc: "グリップネジを緩めてグリップパネルを取り外します。", partId: "grip", explode: { y: -2 } }
];

let scene, camera, renderer, controls;
let parts = {};
let currentStep = 0;
let mode = "disassembly";
let selectedPart = null;
let isAnimating = false;

function init() {
  const container = document.getElementById("canvas-container");
  
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0f1a);
  
  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(8, 6, 12);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.insertBefore(renderer.domElement, container.firstChild);
  
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 5;
  controls.maxDistance = 30;
  controls.target.set(0, 0, 0);
  
  const ambientLight = new THREE.AmbientLight(0x404050, 0.6);
  scene.add(ambientLight);
  
  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(10, 15, 10);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.width = 2048;
  mainLight.shadow.mapSize.height = 2048;
  mainLight.shadow.camera.near = 0.5;
  mainLight.shadow.camera.far = 50;
  mainLight.shadow.camera.left = -15;
  mainLight.shadow.camera.right = 15;
  mainLight.shadow.camera.top = 15;
  mainLight.shadow.camera.bottom = -15;
  scene.add(mainLight);
  
  const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
  fillLight.position.set(-5, 5, -5);
  scene.add(fillLight);
  
  const rimLight = new THREE.DirectionalLight(0xff8844, 0.3);
  rimLight.position.set(0, -5, -10);
  scene.add(rimLight);
  
  createVoxelGun();
  
  const gridHelper = new THREE.GridHelper(20, 20, 0x1a2a4a, 0x0a1a2a);
  gridHelper.position.y = -3;
  scene.add(gridHelper);
  
  window.addEventListener("resize", onWindowResize);
  
  setupUI();
  
  animate();
}

function createVoxelBox(width, height, depth, color, segments = 4) {
  const group = new THREE.Group();
  const voxelSize = 0.25;
  
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.7,
    metalness: 0.3
  });
  
  const geo = new THREE.BoxGeometry(voxelSize * 0.95, voxelSize * 0.95, voxelSize * 0.95);
  
  const w = Math.ceil(width / voxelSize);
  const h = Math.ceil(height / voxelSize);
  const d = Math.ceil(depth / voxelSize);
  
  const instancedMesh = new THREE.InstancedMesh(geo, mat, w * h * d);
  instancedMesh.castShadow = true;
  instancedMesh.receiveShadow = true;
  
  const matrix = new THREE.Matrix4();
  let idx = 0;
  
  for (let x = 0; x < w; x++) {
    for (let y = 0; y < h; y++) {
      for (let z = 0; z < d; z++) {
        matrix.setPosition(
          (x - w / 2 + 0.5) * voxelSize,
          (y - h / 2 + 0.5) * voxelSize,
          (z - d / 2 + 0.5) * voxelSize
        );
        instancedMesh.setMatrixAt(idx++, matrix);
      }
    }
  }
  
  instancedMesh.count = idx;
  group.add(instancedMesh);
  
  return group;
}

function createVoxelGun() {
  const slide = new THREE.Group();
  slide.name = "slide";
  const slideBody = createVoxelBox(4.5, 0.8, 1.2, PARTS_DATA[0].color);
  slide.add(slideBody);
  const slideRear = createVoxelBox(1.2, 1.0, 1.2, PARTS_DATA[0].color);
  slideRear.position.set(-1.8, 0.1, 0);
  slide.add(slideRear);
  const ejectionPort = createVoxelBox(0.8, 0.3, 0.6, 0x1a1a1a);
  ejectionPort.position.set(0.3, 0.25, 0);
  slide.add(ejectionPort);
  slide.position.set(0, 1.2, 0);
  parts.slide = slide;
  scene.add(slide);
  
  const barrel = new THREE.Group();
  barrel.name = "barrel";
  const barrelOuter = createVoxelBox(2.5, 0.5, 0.5, PARTS_DATA[1].color);
  barrel.add(barrelOuter);
  const barrelInner = createVoxelBox(2.2, 0.25, 0.25, 0x2a2a2a);
  barrelInner.position.y = 0.05;
  barrel.add(barrelInner);
  barrel.position.set(1.5, 0.85, 0);
  parts.barrel = barrel;
  scene.add(barrel);
  
  const frame = new THREE.Group();
  frame.name = "frame";
  const frameBody = createVoxelBox(3.5, 1.0, 1.0, PARTS_DATA[2].color);
  frame.add(frameBody);
  const triggerGuard = createVoxelBox(1.5, 0.6, 0.8, PARTS_DATA[2].color);
  triggerGuard.position.set(0.5, -0.8, 0);
  frame.add(triggerGuard);
  const guardFront = createVoxelBox(0.3, 0.4, 0.6, PARTS_DATA[2].color);
  guardFront.position.set(1.2, -0.5, 0);
  frame.add(guardFront);
  parts.frame = frame;
  scene.add(frame);
  
  const trigger = new THREE.Group();
  trigger.name = "trigger";
  const triggerBody = createVoxelBox(0.2, 0.8, 0.3, PARTS_DATA[3].color);
  trigger.add(triggerBody);
  const triggerFace = createVoxelBox(0.4, 0.3, 0.15, PARTS_DATA[3].color);
  triggerFace.position.set(0.1, -0.25, 0);
  trigger.add(triggerFace);
  trigger.position.set(0.2, -0.6, 0);
  parts.trigger = trigger;
  scene.add(trigger);
  
  const hammer = new THREE.Group();
  hammer.name = "hammer";
  const hammerBody = createVoxelBox(0.5, 0.7, 0.4, PARTS_DATA[4].color);
  hammer.add(hammerBody);
  const hammerSpur = createVoxelBox(0.3, 0.3, 0.35, PARTS_DATA[4].color);
  hammerSpur.position.set(0, 0.4, 0);
  hammer.add(hammerSpur);
  hammer.position.set(-1.5, 0.8, 0);
  parts.hammer = hammer;
  scene.add(hammer);
  
  const grip = new THREE.Group();
  grip.name = "grip";
  const gripBody = createVoxelBox(1.2, 2.0, 1.0, PARTS_DATA[5].color);
  grip.add(gripBody);
  const gripTexture1 = createVoxelBox(0.05, 0.3, 0.8, 0x1a1a1a);
  gripTexture1.position.set(0.6, 0.3, 0);
  grip.add(gripTexture1);
  const gripTexture2 = createVoxelBox(0.05, 0.3, 0.8, 0x1a1a1a);
  gripTexture2.position.set(0.6, -0.3, 0);
  grip.add(gripTexture2);
  const gripTexture3 = createVoxelBox(0.05, 0.3, 0.8, 0x1a1a1a);
  gripTexture3.position.set(-0.6, 0.3, 0);
  grip.add(gripTexture3);
  const gripTexture4 = createVoxelBox(0.05, 0.3, 0.8, 0x1a1a1a);
  gripTexture4.position.set(-0.6, -0.3, 0);
  grip.add(gripTexture4);
  grip.position.set(-0.8, -2.0, 0);
  grip.rotation.z = 0.15;
  parts.grip = grip;
  scene.add(grip);
  
  const magazine = new THREE.Group();
  magazine.name = "magazine";
  const magBody = createVoxelBox(0.7, 1.8, 0.7, PARTS_DATA[6].color);
  magazine.add(magBody);
  const magBase = createVoxelBox(0.8, 0.15, 0.8, 0x2a2a2a);
  magBase.position.y = -0.9;
  magazine.add(magBase);
  magazine.position.set(-0.2, -1.8, 0);
  parts.magazine = magazine;
  scene.add(magazine);
  
  const recoilSpring = new THREE.Group();
  recoilSpring.name = "recoil_spring";
  const springMat = new THREE.MeshStandardMaterial({ color: PARTS_DATA[7].color, roughness: 0.4, metalness: 0.6 });
  for (let i = 0; i < 12; i++) {
    const coil = new THREE.Mesh(
      new THREE.TorusGeometry(0.25, 0.05, 8, 16),
      springMat
    );
    coil.rotation.x = Math.PI / 2;
    coil.position.set(i * 0.15 - 0.8, 0, 0);
    coil.castShadow = true;
    recoilSpring.add(coil);
  }
  recoilSpring.position.set(1.0, 0.5, 0);
  parts.recoil_spring = recoilSpring;
  scene.add(recoilSpring);
  
  const guideRod = new THREE.Group();
  guideRod.name = "guide_rod";
  const rodBody = createVoxelBox(2.0, 0.15, 0.15, PARTS_DATA[8].color);
  guideRod.add(rodBody);
  const rodCap = createVoxelBox(0.2, 0.25, 0.25, 0x3a3a3a);
  rodCap.position.set(1.0, 0, 0);
  guideRod.add(rodCap);
  guideRod.position.set(1.2, 0.35, 0);
  parts.guide_rod = guideRod;
  scene.add(guideRod);
  
  const sights = new THREE.Group();
  sights.name = "sights";
  const frontSight = createVoxelBox(0.2, 0.35, 0.2, PARTS_DATA[9].color);
  frontSight.position.set(2.0, 0.55, 0);
  sights.add(frontSight);
  const rearSightBase = createVoxelBox(0.6, 0.25, 0.4, PARTS_DATA[9].color);
  rearSightBase.position.set(-1.6, 0.5, 0);
  sights.add(rearSightBase);
  const rearSightNotch = createVoxelBox(0.2, 0.15, 0.25, 0x0a0a0a);
  rearSightNotch.position.set(-1.6, 0.6, 0);
  sights.add(rearSightNotch);
  parts.sights = sights;
  scene.add(sights);
  
  Object.keys(parts).forEach(id => {
    parts[id].userData.originalPosition = parts[id].position.clone();
    parts[id].userData.originalRotation = parts[id].rotation.clone();
  });
}

function animatePart(partId, targetPos, targetRot, duration = 800) {
  return new Promise(resolve => {
    const part = parts[partId];
    if (!part) { resolve(); return; }
    
    const startPos = part.position.clone();
    const startRot = { x: part.rotation.x, y: part.rotation.y, z: part.rotation.z };
    const endRot = targetRot || { x: 0, y: 0, z: 0 };
    
    const startTime = Date.now();
    
    function update() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = easeOutCubic(progress);
      
      part.position.lerpVectors(startPos, targetPos, eased);
      part.rotation.x = startRot.x + (endRot.x - startRot.x) * eased;
      part.rotation.y = startRot.y + (endRot.y - startRot.y) * eased;
      part.rotation.z = startRot.z + (endRot.z - startRot.z) * eased;
      
      if (progress < 1) {
        requestAnimationFrame(update);
      } else {
        resolve();
      }
    }
    
    update();
  });
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function highlightPart(partId) {
  Object.keys(parts).forEach(id => {
    parts[id].traverse(child => {
      if (child.isInstancedMesh || child.isMesh) {
        child.material = child.material.clone();
        child.material.emissive = new THREE.Color(id === partId ? 0x00d4ff : 0x000000);
        child.material.emissiveIntensity = id === partId ? 0.3 : 0;
      }
    });
  });
  
  selectedPart = partId;
  updateDetailPanel(partId);
  
  document.querySelectorAll(".part-item").forEach(el => {
    el.classList.toggle("selected", el.dataset.partId === partId);
  });
}

function updateDetailPanel(partId) {
  const part = PARTS_DATA.find(p => p.id === partId);
  if (part) {
    document.getElementById("detailTitle").textContent = part.name;
    document.getElementById("detailDesc").textContent = part.role;
  }
}

function applyStep(stepIndex, isAssembly = false) {
  isAnimating = true;
  
  const steps = isAssembly ? [...DISASSEMBLY_STEPS].reverse() : DISASSEMBLY_STEPS;
  
  Object.keys(parts).forEach(id => {
    const part = parts[id];
    if (part.userData.originalPosition) {
      part.position.copy(part.userData.originalPosition);
    }
    if (part.userData.originalRotation) {
      part.rotation.copy(part.userData.originalRotation);
    }
  });
  
  const promises = [];
  
  for (let i = 0; i <= stepIndex && i < steps.length; i++) {
    const step = steps[i];
    const part = parts[step.partId];
    if (part && step.explode) {
      const explode = step.explode;
      const targetPos = part.userData.originalPosition.clone();
      targetPos.x += (explode.x || 0);
      targetPos.y += (explode.y || 0);
      targetPos.z += (explode.z || 0);
      
      if (i === stepIndex) {
        promises.push(animatePart(step.partId, targetPos));
      } else {
        part.position.copy(targetPos);
      }
    }
  }
  
  Promise.all(promises).then(() => {
    isAnimating = false;
  });
}

function resetAllParts() {
  isAnimating = true;
  const promises = [];
  
  Object.keys(parts).forEach(id => {
    const part = parts[id];
    if (part.userData.originalPosition) {
      promises.push(animatePart(id, part.userData.originalPosition.clone(), {
        x: part.userData.originalRotation.x,
        y: part.userData.originalRotation.y,
        z: part.userData.originalRotation.z
      }, 600));
    }
  });
  
  Promise.all(promises).then(() => {
    isAnimating = false;
  });
}

function setupUI() {
  const stepsList = document.getElementById("stepsList");
  const partsList = document.getElementById("partsList");
  
  function renderSteps() {
    stepsList.innerHTML = "";
    const steps = mode === "disassembly" ? DISASSEMBLY_STEPS : [...DISASSEMBLY_STEPS].reverse();
    
    steps.forEach((step, i) => {
      const div = document.createElement("div");
      div.className = "step-item" + (i === currentStep ? " active" : "") + (i < currentStep ? " completed" : "");
      div.innerHTML = `
        <div class="step-num">Step ${i + 1}</div>
        <div class="step-name">${step.title}</div>
      `;
      div.addEventListener("click", () => goToStep(i));
      stepsList.appendChild(div);
    });
  }
  
  function renderParts() {
    partsList.innerHTML = "";
    PARTS_DATA.forEach(part => {
      const div = document.createElement("div");
      div.className = "part-item";
      div.dataset.partId = part.id;
      div.innerHTML = `
        <div class="part-color" style="background:#${part.color.toString(16).padStart(6, "0")}"></div>
        <div class="part-name">${part.name}</div>
        <div class="part-status">接続</div>
      `;
      div.addEventListener("click", () => highlightPart(part.id));
      partsList.appendChild(div);
    });
  }
  
  function updateUI() {
    const steps = mode === "disassembly" ? DISASSEMBLY_STEPS : [...DISASSEMBLY_STEPS].reverse();
    const step = steps[currentStep];
    
    document.getElementById("currentStep").textContent = currentStep + 1;
    document.getElementById("totalSteps").textContent = steps.length;
    document.getElementById("stepTitle").textContent = step.title;
    document.getElementById("stepDesc").textContent = step.desc;
    document.getElementById("modeLabel").textContent = mode === "disassembly" ? "分解モード" : "組立モード";
    document.getElementById("progressFill").style.width = ((currentStep + 1) / steps.length * 100) + "%";
    
    document.getElementById("prevBtn").disabled = currentStep === 0;
    document.getElementById("nextBtn").disabled = currentStep === steps.length - 1;
    
    renderSteps();
  }
  
  function goToStep(index) {
    if (isAnimating) return;
    const steps = mode === "disassembly" ? DISASSEMBLY_STEPS : [...DISASSEMBLY_STEPS].reverse();
    if (index < 0 || index >= steps.length) return;
    
    currentStep = index;
    updateUI();
    applyStep(currentStep, mode === "assembly");
    
    const step = steps[currentStep];
    highlightPart(step.partId);
  }
  
  document.getElementById("prevBtn").addEventListener("click", () => goToStep(currentStep - 1));
  document.getElementById("nextBtn").addEventListener("click", () => goToStep(currentStep + 1));
  
  document.getElementById("modeBtn").addEventListener("click", () => {
    mode = mode === "disassembly" ? "assembly" : "disassembly";
    document.getElementById("modeBtn").textContent = mode === "disassembly" ? "組立モード" : "分解モード";
    currentStep = 0;
    resetAllParts();
    updateUI();
    applyStep(0, mode === "assembly");
  });
  
  document.getElementById("resetBtn").addEventListener("click", () => {
    currentStep = 0;
    resetAllParts();
    updateUI();
  });
  
  renderParts();
  updateUI();
  applyStep(0, false);
}

function onWindowResize() {
  const container = document.getElementById("canvas-container");
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

init();
</script>
