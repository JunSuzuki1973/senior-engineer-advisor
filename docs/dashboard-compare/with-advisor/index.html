<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Portfolio Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<!-- ========== STYLES ========== -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--okabe1:#E69F00;--okabe2:#56B4E9;--okabe3:#009E73;--okabe4:#F0E442;--okabe5:#0072B2;--okabe6:#D55E00;--okabe7:#CC79A7;--okabe8:#999999}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;padding:16px;max-width:1600px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.hdr{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.hdr-left h1{font-size:1.5rem;margin-bottom:4px}
.hdr-right{text-align:right}
.total{font-size:2rem;font-weight:700}
.change24h{font-size:1rem;margin-top:4px}
.change24h.up{color:#009E73}
.change24h.down{color:#D55E00}
.status{display:flex;align-items:center;gap:8px;margin-top:8px;justify-content:flex-end}
.dot{width:10px;height:10px;border-radius:50%;background:#009E73}
.dot.stale{background:#D55E00}
.stale-text{color:var(--muted);font-size:0.85rem}
.pie{grid-column:span 4}
.line{grid-column:span 4}
.bar{grid-column:span 4}
.edit{grid-column:span 6}
.risk{grid-column:span 6}
@media(max-width:1024px){.pie,.line,.bar{grid-column:span 6}.edit,.risk{grid-column:1/-1}}
@media(max-width:640px){.pie,.line,.bar,.edit,.risk{grid-column:1/-1}}
h2{font-size:1rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.chart-wrap{position:relative;height:250px}
.holdings-list{max-height:300px;overflow-y:auto}
.holding{display:flex;align-items:center;gap:12px;padding:8px;border-bottom:1px solid var(--border)}
.holding:last-child{border-bottom:none}
.holding-color{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.holding-info{flex:1;min-width:0}
.holding-sym{font-weight:600}
.holding-name{font-size:0.85rem;color:var(--muted)}
.holding-qty{width:120px;text-align:right}
.holding-value{text-align:right;min-width:100px}
.holding-pct{font-size:0.85rem;color:var(--muted)}
.holding input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;text-align:right}
.holding input:focus{outline:none;border-color:#56B4E9}
.btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.9rem}
.btn:hover{background:var(--border)}
.btn-add{background:#009E73;border-color:#009E73;color:#fff}
.btn-add:hover{background:#008060}
.btn-rm{background:transparent;border:none;color:#D55E00;cursor:pointer;padding:4px}
.btn-rm:hover{color:#ff6b35}
.add-form{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.add-form select,.add-form input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:4px}
.add-form select{flex:1;min-width:120px}
.add-form input{width:120px}
.risk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.risk-item{background:var(--bg);padding:12px;border-radius:6px}
.risk-label{font-size:0.85rem;color:var(--muted);margin-bottom:4px}
.risk-value{font-size:1.25rem;font-weight:600}
.volatility-low{color:#009E73}
.volatility-med{color:#F0E442}
.volatility-high{color:#D55E00}
dialog{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;color:var(--text);max-width:400px}
dialog::backdrop{background:rgba(0,0,0,0.7)}
dialog h3{margin-bottom:16px}
dialog form{display:flex;flex-direction:column;gap:12px}
</style>

<!-- ========== MARKUP ========== -->
<div class="app">
  <header class="card hdr">
    <div class="hdr-left">
      <h1>Portfolio Dashboard</h1>
      <span class="stale-text" id="lastUpdate">Loading...</span>
    </div>
    <div class="hdr-right">
      <div class="total" id="totalValue">$0.00</div>
      <div class="change24h" id="change24h">24h: --</div>
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span class="stale-text" id="statusText">Connecting...</span>
      </div>
    </div>
  </header>

  <section class="card pie">
    <h2>Allocation</h2>
    <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
  </section>

  <section class="card line">
    <h2>30-Day Price History</h2>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
  </section>

  <section class="card bar">
    <h2>24h Performance</h2>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </section>

  <section class="card edit">
    <h2>Holdings</h2>
    <div class="holdings-list" id="holdingsList"></div>
    <div class="add-form">
      <select id="addCoin"></select>
      <input type="number" id="addQty" placeholder="Amount" step="any" min="0">
      <button class="btn btn-add" id="addBtn">Add</button>
    </div>
  </section>

  <section class="card risk">
    <h2>Risk Metrics</h2>
    <div class="risk-grid" id="riskGrid">
      <div class="risk-item">
        <div class="risk-label">Volatility (30d)</div>
        <div class="risk-value" id="volatility">--</div>
      </div>
      <div class="risk-item">
        <div class="risk-label">Max Drawdown</div>
        <div class="risk-value" id="drawdown">--</div>
      </div>
      <div class="risk-item">
        <div class="risk-label">Concentration</div>
        <div class="risk-value" id="concentration">--</div>
      </div>
      <div class="risk-item">
        <div class="risk-label">Vol-Adj Return</div>
        <div class="risk-value" id="volAdjReturn">--</div>
      </div>
    </div>
  </section>
</div>

<dialog id="errorDialog">
  <h3>Connection Error</h3>
  <p id="errorMessage">Unable to fetch prices. Using cached data.</p>
  <form method="dialog"><button class="btn">OK</button></form>
</dialog>

<script>
// ========== STATE + STORAGE ==========
const STORAGE_KEY = 'pf.v1';
const COIN_MAP = {
  BTC: { id: 'bitcoin', name: 'Bitcoin' },
  ETH: { id: 'ethereum', name: 'Ethereum' },
  SOL: { id: 'solana', name: 'Solana' },
  BNB: { id: 'binancecoin', name: 'BNB' },
  XRP: { id: 'ripple', name: 'XRP' },
  ADA: { id: 'cardano', name: 'Cardano' },
  DOGE: { id: 'dogecoin', name: 'Dogecoin' },
  DOT: { id: 'polkadot', name: 'Polkadot' },
  MATIC: { id: 'matic-network', name: 'Polygon' },
  LINK: { id: 'chainlink', name: 'Chainlink' },
  AVAX: { id: 'avalanche-2', name: 'Avalanche' },
  UNI: { id: 'uniswap', name: 'Uniswap' },
  ATOM: { id: 'cosmos', name: 'Cosmos' },
  LTC: { id: 'litecoin', name: 'Litecoin' },
  NEAR: { id: 'near', name: 'NEAR' },
  APT: { id: 'aptos', name: 'Aptos' },
  ARB: { id: 'arbitrum', name: 'Arbitrum' },
  OP: { id: 'optimism', name: 'Optimism' },
  INJ: { id: 'injective-protocol', name: 'Injective' },
  SUI: { id: 'sui', name: 'Sui' }
};
const COLORS = ['#E69F00','#56B4E9','#009E73','#F0E442','#0072B2','#D55E00','#CC79A7','#999999'];

let state = {
  holdings: [],
  prices: {},
  history: {},
  lastOk: 0,
  lastHistoryFetch: 0
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.holdings = parsed.holdings || [];
    }
  } catch (e) {
    console.error('Load error:', e);
  }
  if (state.holdings.length === 0) {
    state.holdings = [
      { sym: 'BTC', qty: 0.5 },
      { sym: 'ETH', qty: 4 },
      { sym: 'SOL', qty: 50 }
    ];
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ holdings: state.holdings }));
  } catch (e) {
    console.error('Save error:', e);
  }
}

// ========== API LAYER ==========
const API_BASE = 'https://api.coingecko.com/api/v3';
let fetchTimeout = null;

async function fetchWithRetry(url, retries = 2) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      if (i < retries - 1) {
        await new Promise(r => setTimeout(r, 1000 * (i + 1)));
      }
      throw e;
    }
  }
}

async function fetchPrices() {
  const ids = [...new Set(state.holdings.map(h => COIN_MAP[h.sym]?.id).filter(Boolean))];
  if (ids.length === 0) return {};
  
  const url = `${API_BASE}/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_24hr_change=true`;
  const data = await fetchWithRetry(url);
  return data || {};
}

async function fetchHistory(coinId) {
  const url = `${API_BASE}/coins/${coinId}/market_chart?vs_currency=usd&days=30&interval=daily`;
  const data = await fetchWithRetry(url);
  return data?.prices || [];
}

async function fetchAllHistory() {
  const ids = [...new Set(state.holdings.map(h => COIN_MAP[h.sym]?.id).filter(Boolean))];
  const results = {};
  
  for (const id of ids) {
    try {
      results[id] = await fetchHistory(id);
      await new Promise(r => setTimeout(r, 300));
    } catch (e) {
      console.error(`History fetch failed for ${id}:`, e);
      results[id] = state.history[id] || [];
    }
  }
  return results;
}

// ========== RISK ANALYTICS ==========
function computeDailyReturns(prices) {
  const returns = [];
  for (let i = 1; i < prices.length; i++) {
    const prev = prices[i - 1][1];
    const curr = prices[i][1];
    if (prev > 0) {
      returns.push((curr - prev) / prev);
    }
  }
  return returns;
}

function computeStdDev(values) {
  if (values.length < 2) return 0;
  const mean = values.reduce((a, b) => a + b, 0) / values.length;
  const sqDiffs = values.map(v => Math.pow(v - mean, 2));
  const variance = sqDiffs.reduce((a, b) => a + b, 0) / values.length;
  return Math.sqrt(variance);
}

function computeVolatility(prices) {
  const dailyReturns = computeDailyReturns(prices);
  const dailyStdDev = computeStdDev(dailyReturns);
  return dailyStdDev * Math.sqrt(365) * 100;
}

function computeMaxDrawdown(prices) {
  if (prices.length < 2) return 0;
  let maxPrice = prices[0][1];
  let maxDrawdown = 0;
  
  for (const [, price] of prices) {
    if (price > maxPrice) maxPrice = price;
    const drawdown = (maxPrice - price) / maxPrice;
    if (drawdown > maxDrawdown) maxDrawdown = drawdown;
  }
  return maxDrawdown * 100;
}

function computeHerfindahl(weights) {
  return weights.reduce((sum, w) => sum + w * w, 0) * 100;
}

function computeRiskMetrics() {
  const holdings = state.holdings;
  const prices = state.prices;
  const history = state.history;
  
  if (holdings.length === 0) {
    return { volatility: 0, drawdown: 0, concentration: 0, volAdjReturn: 0 };
  }
  
  const totalValue = holdings.reduce((sum, h) => {
    const price = prices[COIN_MAP[h.sym]?.id]?.usd || 0;
    return sum + h.qty * price;
  }, 0);
  
  if (totalValue === 0) {
    return { volatility: 0, drawdown: 0, concentration: 0, volAdjReturn: 0 };
  }
  
  const weights = holdings.map(h => {
    const price = prices[COIN_MAP[h.sym]?.id]?.usd || 0;
    return (h.qty * price) / totalValue;
  });
  
  const concentration = computeHerfindahl(weights);
  
  let weightedVolatility = 0;
  let weightedDrawdown = 0;
  let weightedReturn24h = 0;
  
  for (let i = 0; i < holdings.length; i++) {
    const h = holdings[i];
    const coinId = COIN_MAP[h.sym]?.id;
    const priceData = prices[coinId];
    const hist = history[coinId];
    const weight = weights[i];
    
    if (hist && hist.length > 1) {
      weightedVolatility += computeVolatility(hist) * weight;
      weightedDrawdown += computeMaxDrawdown(hist) * weight;
    }
    
    if (priceData?.usd_24h_change) {
      weightedReturn24h += priceData.usd_24h_change * weight;
    }
  }
  
  const volAdjReturn = weightedVolatility > 0 
    ? (weightedReturn24h * 365) / weightedVolatility 
    : 0;
  
  return {
    volatility: weightedVolatility,
    drawdown: weightedDrawdown,
    concentration,
    volAdjReturn
  };
}

// ========== CHARTS ==========
let pieChart = null;
let lineChart = null;
let barChart = null;

const chartOptions = {
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 0 },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#161b22',
      borderColor: '#30363d',
      borderWidth: 1,
      titleColor: '#c9d1d9',
      bodyColor: '#c9d1d9'
    }
  }
};

function initCharts() {
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  const lineCtx = document.getElementById('lineChart').getContext('2d');
  const barCtx = document.getElementById('barChart').getContext('2d');
  
  pieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: COLORS, borderWidth: 0 }] },
    options: {
      ...chartOptions,
      cutout: '60%',
      plugins: {
        ...chartOptions.plugins,
        tooltip: {
          ...chartOptions.plugins.tooltip,
          callbacks: {
            label: ctx => `${ctx.label}: ${ctx.parsed.toFixed(2)}%`
          }
        }
      }
    }
  });
  
  lineChart = new Chart(lineCtx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      ...chartOptions,
      scales: {
        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', maxTicksLimit: 6 } },
        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
      },
      interaction: { intersect: false, mode: 'index' }
    }
  });
  
  barChart = new Chart(barCtx, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
    options: {
      ...chartOptions,
      scales: {
        x: { grid: { display: false }, ticks: { color: '#8b949e' } },
        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } }
      }
    }
  });
}

// ========== RENDER + EVENTS ==========
const fmtCurrency = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
const fmtPercent = new Intl.NumberFormat('en-US', { style: 'percent', minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNumber = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function updateCharts(pricesChanged = false, structureChanged = false) {
  const holdings = state.holdings;
  const prices = state.prices;
  
  if (holdings.length === 0) {
    pieChart.data.labels = [];
    pieChart.data.datasets[0].data = [];
    barChart.data.labels = [];
    barChart.data.datasets[0].data = [];
    pieChart.update('none');
    barChart.update('none');
    return;
  }
  
  const totalValue = holdings.reduce((sum, h) => {
    const price = prices[COIN_MAP[h.sym]?.id]?.usd || 0;
    return sum + h.qty * price;
  }, 0);
  
  document.getElementById('totalValue').textContent = fmtCurrency.format(totalValue);
  
  const weights = holdings.map(h => {
    const price = prices[COIN_MAP[h.sym]?.id]?.usd || 0;
    return totalValue > 0 ? (h.qty * price) / totalValue * 100 : 0;
  });
  
  pieChart.data.labels = holdings.map(h => h.sym);
  pieChart.data.datasets[0].data = weights;
  
  const changes24h = holdings.map(h => {
    return prices[COIN_MAP[h.sym]?.id]?.usd_24h_change || 0;
  });
  
  const barColors = changes24h.map(c => c >= 0 ? '#009E73' : '#D55E00');
  
  barChart.data.labels = holdings.map(h => h.sym);
  barChart.data.datasets[0].data = changes24h;
  barChart.data.datasets[0].backgroundColor = barColors;
  
  const avgChange = weights.reduce((sum, w, i) => sum + (w / 100) * changes24h[i], 0);
  const changeEl = document.getElementById('change24h');
  changeEl.textContent = `24h: ${avgChange >= 0 ? '+' : ''}${fmtNumber.format(avgChange)}%`;
  changeEl.className = `change24h ${avgChange >= 0 ? 'up' : 'down'}`;
  
  const anim = pricesChanged ? 'none' : undefined;
  pieChart.update(anim);
  barChart.update(anim);
}

function updateLineChart() {
  const holdings = state.holdings;
  const history = state.history;
  
  if (holdings.length === 0 || Object.keys(history).length === 0) {
    lineChart.data.labels = [];
    lineChart.data.datasets = [];
    lineChart.update('none');
    return;
  }
  
  const firstHist = history[COIN_MAP[holdings[0].sym]?.id];
  if (!firstHist || firstHist.length === 0) {
    lineChart.data.labels = [];
    lineChart.data.datasets = [];
    lineChart.update('none');
    return;
  }
  
  const labels = firstHist.map(p => {
    const d = new Date(p[0]);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  });
  
  const datasets = holdings.map((h, i) => {
    const coinId = COIN_MAP[h.sym]?.id;
    const hist = history[coinId] || [];
    const basePrice = hist[0]?.[1] || 1;
    
    return {
      label: h.sym,
      data: hist.map(p => ((p[1] - basePrice) / basePrice) * 100),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + '20',
      fill: false,
      tension: 0.3,
      pointRadius: 0
    };
  });
  
  lineChart.data.labels = labels;
  lineChart.data.datasets = datasets;
  lineChart.update('none');
}

function updateRiskDisplay() {
  const metrics = computeRiskMetrics();
  
  const volEl = document.getElementById('volatility');
  volEl.textContent = `${fmtNumber.format(metrics.volatility)}%`;
  volEl.className = `risk-value ${metrics.volatility < 50 ? 'volatility-low' : metrics.volatility < 80 ? 'volatility-med' : 'volatility-high'}`;
  
  document.getElementById('drawdown').textContent = `-${fmtNumber.format(metrics.drawdown)}%`;
  document.getElementById('concentration').textContent = `${fmtNumber.format(metrics.concentration)}%`;
  document.getElementById('volAdjReturn').textContent = fmtNumber.format(metrics.volAdjReturn);
}

function renderHoldings() {
  const list = document.getElementById('holdingsList');
  const prices = state.prices;
  
  const totalValue = state.holdings.reduce((sum, h) => {
    const price = prices[COIN_MAP[h.sym]?.id]?.usd || 0;
    return sum + h.qty * price;
  }, 0);
  
  list.innerHTML = state.holdings.map((h, i) => {
    const coin = COIN_MAP[h.sym] || { name: h.sym };
    const price = prices[coin.id]?.usd || 0;
    const value = h.qty * price;
    const pct = totalValue > 0 ? (value / totalValue) * 100 : 0;
    
    return `
      <div class="holding" data-sym="${h.sym}">
        <div class="holding-color" style="background:${COLORS[i % COLORS.length]}"></div>
        <div class="holding-info">
          <div class="holding-sym">${h.sym}</div>
          <div class="holding-name">${coin.name}</div>
        </div>
        <div class="holding-qty">
          <input type="number" value="${h.qty}" step="any" min="0" class="qty-input">
        </div>
        <div class="holding-value">
          <div>${fmtCurrency.format(value)}</div>
          <div class="holding-pct">${fmtNumber.format(pct)}%</div>
        </div>
        <button class="btn-rm" title="Remove">✕</button>
      </div>
    `;
  }).join('');
}

function updateCoinSelect() {
  const select = document.getElementById('addCoin');
  const existing = new Set(state.holdings.map(h => h.sym));
  
  select.innerHTML = Object.entries(COIN_MAP)
    .filter(([sym]) => !existing.has(sym))
    .map(([sym, coin]) => `<option value="${sym}">${sym} - ${coin.name}</option>`)
    .join('');
  
  if (select.options.length === 0) {
    select.innerHTML = '<option value="">All coins added</option>';
    document.getElementById('addBtn').disabled = true;
  } else {
    document.getElementById('addBtn').disabled = false;
  }
}

function updateStatus() {
  const now = Date.now();
  const elapsed = now - state.lastOk;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const lastUpdate = document.getElementById('lastUpdate');
  
  if (elapsed > 45000) {
    dot.classList.add('stale');
    text.textContent = 'Stale data';
  } else {
    dot.classList.remove('stale');
    text.textContent = 'Live';
  }
  
  if (state.lastOk > 0) {
    const secs = Math.floor(elapsed / 1000);
    lastUpdate.textContent = secs < 60 ? `Updated ${secs}s ago` : `Updated ${Math.floor(secs / 60)}m ago`;
  }
}

function setupEvents() {
  document.getElementById('holdingsList').addEventListener('input', e => {
    if (e.target.classList.contains('qty-input')) {
      const holding = e.target.closest('.holding');
      const sym = holding.dataset.sym;
      const qty = parseFloat(e.target.value) || 0;
      
      const h = state.holdings.find(h => h.sym === sym);
      if (h) {
        h.qty = qty;
        saveState();
        clearTimeout(fetchTimeout);
        fetchTimeout = setTimeout(() => poll(true), 300);
      }
    }
  });
  
  document.getElementById('holdingsList').addEventListener('click', e => {
    if (e.target.classList.contains('btn-rm')) {
      const holding = e.target.closest('.holding');
      const sym = holding.dataset.sym;
      
      state.holdings = state.holdings.filter(h => h.sym !== sym);
      saveState();
      renderHoldings();
      updateCoinSelect();
      poll(true);
    }
  });
  
  document.getElementById('addBtn').addEventListener('click', () => {
    const select = document.getElementById('addCoin');
    const qtyInput = document.getElementById('addQty');
    const sym = select.value;
    const qty = parseFloat(qtyInput.value) || 0;
    
    if (sym && qty > 0) {
      state.holdings.push({ sym, qty });
      saveState();
      renderHoldings();
      updateCoinSelect();
      qtyInput.value = '';
      poll(true);
      fetchAllHistory().then(hist => {
        state.history = hist;
        state.lastHistoryFetch = Date.now();
        updateLineChart();
        updateRiskDisplay();
      });
    }
  });
}

// ========== BOOT ==========
let pollInterval = null;

async function poll(structureChanged = false) {
  try {
    const prices = await fetchPrices();
    state.prices = prices;
    state.lastOk = Date.now();
    
    updateCharts(true, structureChanged);
    renderHoldings();
    updateRiskDisplay();
    updateStatus();
  } catch (e) {
    console.error('Poll error:', e);
    updateStatus();
    updateCharts(false, false);
  }
}

async function init() {
  loadState();
  initCharts();
  renderHoldings();
  updateCoinSelect();
  setupEvents();
  
  try {
    const prices = await fetchPrices();
    state.prices = prices;
    state.lastOk = Date.now();
    
    updateCharts(true, true);
    renderHoldings();
    
    const history = await fetchAllHistory();
    state.history = history;
    state.lastHistoryFetch = Date.now();
    
    updateLineChart();
    updateRiskDisplay();
    updateStatus();
  } catch (e) {
    console.error('Init error:', e);
    updateStatus();
  }
  
  pollInterval = setInterval(() => {
    if (!document.hidden) {
      poll(false);
    }
  }, 20000);
  
  setInterval(() => {
    const now = Date.now();
    if (now - state.lastHistoryFetch > 3600000) {
      fetchAllHistory().then(hist => {
        state.history = hist;
        state.lastHistoryFetch = now;
        updateLineChart();
        updateRiskDisplay();
      }).catch(console.error);
    }
  }, 3600000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
