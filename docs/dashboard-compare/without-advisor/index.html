<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗号通貨ポートフォリオダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px 0 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-item .label {
            font-size: 0.85rem;
            color: #888;
        }
        .stat-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-item .value.positive { color: #00ff88; }
        .stat-item .value.negative { color: #ff4757; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .portfolio-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .portfolio-table th, .portfolio-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .portfolio-table th {
            color: #888;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .portfolio-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .crypto-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
        }
        .crypto-name {
            display: flex;
            align-items: center;
        }
        .change {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .change.positive {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
        .change.negative {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }
        .risk-meter {
            margin-top: 20px;
        }
        .risk-item {
            margin-bottom: 15px;
        }
        .risk-item .label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .risk-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .risk-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .risk-low { background: linear-gradient(90deg, #00ff88, #00d4ff); }
        .risk-medium { background: linear-gradient(90deg, #ffa502, #ff6b6b); }
        .risk-high { background: linear-gradient(90deg, #ff4757, #ff3838); }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #eee;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .last-update {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 20px;
        }
        .allocation-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .allocation-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .allocation-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .allocation-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .updating {
            animation: pulse 1s infinite;
        }
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 暗号通貨ポートフォリオダッシュボード</h1>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="label">総資産額</div>
                    <div class="value" id="totalValue">$0.00</div>
                </div>
                <div class="stat-item">
                    <div class="label">24時間損益</div>
                    <div class="value" id="totalChange">+$0.00</div>
                </div>
                <div class="stat-item">
                    <div class="label">リスクスコア</div>
                    <div class="value" id="riskScore">0/100</div>
                </div>
                <div class="stat-item">
                    <div class="label">保有銘柄数</div>
                    <div class="value" id="assetCount">0</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <button class="btn btn-primary" onclick="refreshPrices()">🔄 価格更新</button>
            <button class="btn btn-secondary" onclick="toggleAutoUpdate()">⏱️ 自動更新: <span id="autoUpdateStatus">OFF</span></button>
            <button class="btn btn-secondary" onclick="editPortfolio()">✏️ ポートフォリオ編集</button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>ポートフォリオ配分</h2>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>価格推移（7日間）</h2>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>リスク分析</h2>
                <div class="risk-meter">
                    <div class="risk-item">
                        <div class="label">
                            <span>ボラティリティ</span>
                            <span id="volatilityValue">0%</span>
                        </div>
                        <div class="risk-bar">
                            <div class="risk-fill risk-low" id="volatilityBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="risk-item">
                        <div class="label">
                            <span>集中度リスク</span>
                            <span id="concentrationValue">0%</span>
                        </div>
                        <div class="risk-bar">
                            <div class="risk-fill risk-medium" id="concentrationBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="risk-item">
                        <div class="label">
                            <span>市場相関</span>
                            <span id="correlationValue">0%</span>
                        </div>
                        <div class="risk-bar">
                            <div class="risk-fill risk-high" id="correlationBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="risk-item">
                        <div class="label">
                            <span>流動性スコア</span>
                            <span id="liquidityValue">0%</span>
                        </div>
                        <div class="risk-bar">
                            <div class="risk-fill risk-low" id="liquidityBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>資産別パフォーマンス</h2>
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>

            <div class="card full-width">
                <h2>保有資産一覧</h2>
                <table class="portfolio-table">
                    <thead>
                        <tr>
                            <th>銘柄</th>
                            <th>保有数量</th>
                            <th>現在価格</th>
                            <th>評価額</th>
                            <th>24h変化</th>
                            <th>配分比率</th>
                        </tr>
                    </thead>
                    <tbody id="portfolioTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="last-update">
            最終更新: <span id="lastUpdate">--</span>
        </div>
    </div>

    <script>
        const portfolio = [
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin', amount: 0.5, color: '#f7931a' },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum', amount: 4.2, color: '#627eea' },
            { id: 'solana', symbol: 'SOL', name: 'Solana', amount: 50, color: '#00d18c' },
            { id: 'cardano', symbol: 'ADA', name: 'Cardano', amount: 5000, color: '#0033ad' },
            { id: 'polkadot', symbol: 'DOT', name: 'Polkadot', amount: 200, color: '#e6007a' },
            { id: 'chainlink', symbol: 'LINK', name: 'Chainlink', amount: 150, color: '#375bd2' }
        ];

        let priceData = {};
        let historyData = {};
        let autoUpdateInterval = null;
        let allocationChart, priceChart, performanceChart;

        const cryptoIcons = {
            'BTC': 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png',
            'ETH': 'https://assets.coingecko.com/coins/images/279/small/ethereum.png',
            'SOL': 'https://assets.coingecko.com/coins/images/4128/small/solana.png',
            'ADA': 'https://assets.coingecko.com/coins/images/975/small/cardano.png',
            'DOT': 'https://assets.coingecko.com/coins/images/12171/small/polkadot.png',
            'LINK': 'https://assets.coingecko.com/coins/images/877/small/chainlink-new-logo.png'
        };

        async function fetchPrices() {
            const ids = portfolio.map(p => p.id).join(',');
            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
                const data = await response.json();
                priceData = data;
                return true;
            } catch (error) {
                console.error('価格取得エラー:', error);
                return false;
            }
        }

        async function fetchHistory() {
            for (const coin of portfolio) {
                try {
                    const response = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}/market_chart?vs_currency=usd&days=7`);
                    const data = await response.json();
                    historyData[coin.id] = data.prices;
                } catch (error) {
                    console.error(`履歴取得エラー (${coin.id}):`, error);
                }
            }
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function formatNumber(value, decimals = 2) {
            return new Intl.NumberFormat('en-US', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            }).format(value);
        }

        function updateStats() {
            let totalValue = 0;
            let totalChange = 0;

            portfolio.forEach(coin => {
                if (priceData[coin.id]) {
                    const value = coin.amount * priceData[coin.id].usd;
                    totalValue += value;
                    if (priceData[coin.id].usd_24h_change) {
                        totalChange += value * (priceData[coin.id].usd_24h_change / 100);
                    }
                }
            });

            document.getElementById('totalValue').textContent = formatCurrency(totalValue);
            
            const changeEl = document.getElementById('totalChange');
            changeEl.textContent = (totalChange >= 0 ? '+' : '') + formatCurrency(totalChange);
            changeEl.className = 'value ' + (totalChange >= 0 ? 'positive' : 'negative');

            const riskScore = calculateRiskScore();
            document.getElementById('riskScore').textContent = `${riskScore}/100`;
            document.getElementById('assetCount').textContent = portfolio.length;

            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ja-JP');
        }

        function calculateRiskScore() {
            let volatility = 0;
            let concentration = 0;
            let correlation = 70;
            let liquidity = 90;

            portfolio.forEach(coin => {
                if (priceData[coin.id] && priceData[coin.id].usd_24h_change) {
                    volatility += Math.abs(priceData[coin.id].usd_24h_change);
                }
            });
            volatility = Math.min(volatility / portfolio.length * 2, 100);

            let totalValue = 0;
            const values = portfolio.map(coin => {
                const val = coin.amount * (priceData[coin.id]?.usd || 0);
                totalValue += val;
                return val;
            });
            const maxShare = Math.max(...values.map(v => (v / totalValue) * 100));
            concentration = Math.min(maxShare * 1.5, 100);

            document.getElementById('volatilityValue').textContent = formatNumber(volatility) + '%';
            document.getElementById('volatilityBar').style.width = volatility + '%';
            document.getElementById('concentrationValue').textContent = formatNumber(concentration) + '%';
            document.getElementById('concentrationBar').style.width = concentration + '%';
            document.getElementById('correlationValue').textContent = formatNumber(correlation) + '%';
            document.getElementById('correlationBar').style.width = correlation + '%';
            document.getElementById('liquidityValue').textContent = formatNumber(liquidity) + '%';
            document.getElementById('liquidityBar').style.width = liquidity + '%';

            return Math.round((volatility + concentration + correlation + (100 - liquidity)) / 4);
        }

        function updateTable() {
            const tbody = document.getElementById('portfolioTableBody');
            let totalValue = 0;

            portfolio.forEach(coin => {
                if (priceData[coin.id]) {
                    totalValue += coin.amount * priceData[coin.id].usd;
                }
            });

            tbody.innerHTML = portfolio.map(coin => {
                const price = priceData[coin.id]?.usd || 0;
                const change = priceData[coin.id]?.usd_24h_change || 0;
                const value = coin.amount * price;
                const allocation = totalValue > 0 ? (value / totalValue) * 100 : 0;

                return `
                    <tr>
                        <td>
                            <div class="crypto-name">
                                <img src="${cryptoIcons[coin.symbol]}" alt="${coin.symbol}" class="crypto-icon" onerror="this.style.display='none'">
                                <span>${coin.name} (${coin.symbol})</span>
                            </div>
                        </td>
                        <td>${formatNumber(coin.amount, coin.amount < 10 ? 4 : 2)}</td>
                        <td>${formatCurrency(price)}</td>
                        <td>${formatCurrency(value)}</td>
                        <td><span class="change ${change >= 0 ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${formatNumber(change)}%</span></td>
                        <td>${formatNumber(allocation)}%</td>
                    </tr>
                `;
            }).join('');
        }

        function createAllocationChart() {
            const ctx = document.getElementById('allocationChart').getContext('2d');
            
            const data = portfolio.map(coin => {
                return coin.amount * (priceData[coin.id]?.usd || 0);
            });
            const labels = portfolio.map(coin => coin.symbol);
            const colors = portfolio.map(coin => coin.color);

            if (allocationChart) allocationChart.destroy();

            allocationChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#aaa',
                                padding: 15,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return `${context.label}: ${formatCurrency(context.raw)} (${percentage}%)`;
                                }
                            }
                        }
                    },
                    cutout: '60%'
                }
            });
        }

        function createPriceChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (priceChart) priceChart.destroy();

            const datasets = portfolio.slice(0, 4).map(coin => {
                const prices = historyData[coin.id] || [];
                return {
                    label: coin.symbol,
                    data: prices.map(p => ({ x: p[0], y: p[1] })),
                    borderColor: coin.color,
                    backgroundColor: coin.color + '20',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: false,
                    pointRadius: 0
                };
            });

            priceChart = new Chart(ctx, {
                type: 'line',
                data: { datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#aaa' }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${formatCurrency(context.raw.y)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            display: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: {
                                color: '#666',
                                callback: function(value) {
                                    const date = new Date(value);
                                    return `${date.getMonth()+1}/${date.getDate()}`;
                                }
                            }
                        },
                        y: {
                            display: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: {
                                color: '#666',
                                callback: value => '$' + value.toLocaleString()
                            }
                        }
                    }
                }
            });
        }

        function createPerformanceChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');

            if (performanceChart) performanceChart.destroy();

            const labels = portfolio.map(coin => coin.symbol);
            const changes = portfolio.map(coin => priceData[coin.id]?.usd_24h_change || 0);
            const colors = changes.map(c => c >= 0 ? '#00ff88' : '#ff4757');

            performanceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '24h変化 (%)',
                        data: changes,
                        backgroundColor: colors.map(c => c + '80'),
                        borderColor: colors,
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `変化: ${context.raw >= 0 ? '+' : ''}${formatNumber(context.raw)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#aaa' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: {
                                color: '#666',
                                callback: value => value + '%'
                            }
                        }
                    }
                }
            });
        }

        async function refreshPrices() {
            document.getElementById('totalValue').classList.add('updating');
            
            await fetchPrices();
            updateStats();
            updateTable();
            createAllocationChart();
            createPerformanceChart();
            
            document.getElementById('totalValue').classList.remove('updating');
        }

        async function initializeDashboard() {
            document.getElementById('lastUpdate').textContent = '読み込み中...';
            
            await fetchPrices();
            await fetchHistory();
            
            updateStats();
            updateTable();
            createAllocationChart();
            createPriceChart();
            createPerformanceChart();
        }

        function toggleAutoUpdate() {
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
                autoUpdateInterval = null;
                document.getElementById('autoUpdateStatus').textContent = 'OFF';
            } else {
                autoUpdateInterval = setInterval(refreshPrices, 60000);
                document.getElementById('autoUpdateStatus').textContent = 'ON (60秒)';
            }
        }

        function editPortfolio() {
            const input = prompt('ポートフォリオ設定 (JSON形式):\n\n' + JSON.stringify(portfolio.map(p => ({
                id: p.id,
                symbol: p.symbol,
                amount: p.amount
            })), null, 2));
            
            if (input) {
                try {
                    const newPortfolio = JSON.parse(input);
                    newPortfolio.forEach((item, i) => {
                        if (portfolio[i]) {
                            portfolio[i].amount = item.amount;
                        }
                    });
                    refreshPrices();
                } catch (e) {
                    alert('JSONの形式が正しくありません');
                }
            }
        }

        initializeDashboard();
    </script>
</body>
</html>
