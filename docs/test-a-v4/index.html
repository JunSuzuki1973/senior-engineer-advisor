<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボクセルアサルトライフル - 分解組み立てシミュレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <div id="title-bar">
            <h1>ASSAULT RIFLE</h1>
            <span class="subtitle">VOXEL DISASSEMBLY SIMULATOR</span>
        </div>

        <div id="controls">
            <button id="btn-disassemble" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
                分解
            </button>
            <button id="btn-assemble" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 5l-7 7 7 7"/>
                </svg>
                組み立て
            </button>
            <button id="btn-reset" class="btn btn-ghost">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 4v6h6M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                </svg>
                リセット
            </button>
        </div>

        <div id="progress-bar">
            <div id="progress-fill"></div>
            <span id="progress-text">組み立て済み</span>
        </div>

        <div id="part-label" class="hidden">
            <span id="part-name"></span>
            <span id="part-desc"></span>
        </div>

        <div id="info-bar">
            <span class="info-item">🖱️ ドラッグで回転</span>
            <span class="info-sep">|</span>
            <span class="info-item">📜 スクロールで拡大</span>
            <span class="info-sep">|</span>
            <span class="info-item">→ 右クリックでパン</span>
        </div>

        <div id="parts-list">
            <h3>部品一覧</h3>
            <ul id="parts-ul">
                <li data-part="upperReceiver">アッパーレシーバー</li>
                <li data-part="lowerReceiver">ロワーレシーバー</li>
                <li data-part="barrel">バレル</li>
                <li data-part="handguard">ハンドガード</li>
                <li data-part="stock">ストック</li>
                <li data-part="magazine">マガジン</li>
                <li data-part="boltCarrier">ボルトキャリア</li>
                <li data-part="chargingHandle">チャージングハンドル</li>
                <li data-part="muzzle">マズルブレーキ</li>
                <li data-part="sight">サイト</li>
            </ul>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="app.js"></script>
</body>
</html>
