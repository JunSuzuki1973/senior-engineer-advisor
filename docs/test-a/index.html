<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VX-9 Phantom | Voxel Disassembly Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f1a;
      --bg-tertiary: #161625;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --accent: #00ccdd;
      --accent-dim: #0099aa;
      --accent-glow: rgba(0, 204, 221, 0.15);
      --accent-secondary: #4466ff;
      --text-primary: #e8e8f0;
      --text-secondary: #9999bb;
      --text-dim: #666688;
      --border: #2a2a44;
      --success: #44dd88;
      --warning: #ddaa44;
      --radius: 8px;
      --transition: 0.2s ease;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    #app {
      display: flex;
      width: 100%; height: 100%;
    }

    #viewport-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-primary);
    }

    #viewport-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .viewport-badge {
      position: absolute;
      top: 16px; left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      user-select: none;
    }

    .viewport-badge .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .viewport-badge .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .progress-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--bg-tertiary);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      width: 0%;
      transition: width 0.5s ease;
      border-radius: 0 2px 2px 0;
    }

    .viewport-hint {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--text-dim);
      pointer-events: none;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    #side-panel {
      width: 320px;
      height: 100%;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .panel-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .panel-subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }

    .toolbar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .toolbar button {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .toolbar button:hover:not(:disabled) {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: var(--accent-dim);
    }

    .toolbar button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .toolbar button.primary {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
      font-weight: 600;
    }

    .toolbar button.primary:hover:not(:disabled) {
      background: var(--accent-dim);
    }

    .toolbar button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .toolbar .step-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }

    .toolbar .step-nav button {
      padding: 6px 10px;
      font-size: 14px;
    }

    .speed-control {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
    }

    .speed-control input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    .speed-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .panel-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--transition);
    }

    .panel-tab:hover {
      color: var(--text-secondary);
    }

    .panel-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .tab-content.hidden {
      display: none;
    }

    .tab-content::-webkit-scrollbar {
      width: 4px;
    }

    .tab-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .tab-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .part-card {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background var(--transition);
      border-left: 3px solid transparent;
    }

    .part-card:hover {
      background: var(--bg-tertiary);
    }

    .part-card.selected {
      background: var(--bg-card);
      border-left-color: var(--accent);
    }

    .part-number {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .part-card.selected .part-number {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .part-info {
      flex: 1;
      min-width: 0;
    }

    .part-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .part-desc {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .part-status {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .part-status.assembled {
      background: rgba(68, 221, 136, 0.15);
      color: var(--success);
    }

    .part-status.exploded {
      background: rgba(221, 170, 68, 0.15);
      color: var(--warning);
    }

    .part-status.animating {
      background: var(--accent-glow);
      color: var(--accent);
      animation: pulse-status 1s ease infinite;
    }

    @keyframes pulse-status {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .step-card {
      padding: 10px 16px;
      cursor: pointer;
      transition: background var(--transition);
      border-left: 3px solid transparent;
    }

    .step-card:hover {
      background: var(--bg-tertiary);
    }

    .step-card.completed {
      border-left-color: var(--success);
      opacity: 0.6;
    }

    .step-card.active {
      border-left-color: var(--accent);
      background: var(--bg-card);
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-number {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .step-action {
      font-size: 13px;
      color: var(--text-primary);
    }

    .step-detail {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      padding-left: 58px;
    }

    #info-panel {
      position: absolute;
      top: 16px; right: 340px;
      width: 220px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transform: translateX(20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
    }

    #info-panel.visible {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .info-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .info-description {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .info-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    .info-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    .info-actions {
      display: flex;
      gap: 6px;
    }

    .info-actions button {
      flex: 1;
      padding: 6px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .info-actions button:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: var(--accent-dim);
    }

    #toast-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 100;
    }

    .toast {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    .toast.info {
      background: rgba(0, 204, 221, 0.15);
      color: var(--accent);
      border: 1px solid rgba(0, 204, 221, 0.3);
    }

    .toast.success {
      background: rgba(68, 221, 136, 0.15);
      color: var(--success);
      border: 1px solid rgba(68, 221, 136, 0.3);
    }

    .toast.warning {
      background: rgba(221, 170, 68, 0.15);
      color: var(--warning);
      border: 1px solid rgba(221, 170, 68, 0.3);
    }

    #mobile-toggle {
      display: none;
      position: absolute;
      top: 16px; right: 16px;
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    @media (max-width: 768px) {
      #side-panel {
        position: absolute;
        right: 0; top: 0; bottom: 0;
        z-index: 20;
        transform: translateX(100%);
      }

      #side-panel.open {
        transform: translateX(0);
      }

      #mobile-toggle {
        display: flex;
      }

      #info-panel {
        right: 16px;
        top: auto;
        bottom: 80px;
        width: calc(100% - 32px);
      }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-BmyeoL3F.js"></script>
</head>
<body>
  <div id="app">
    <div id="viewport-container">
      <div class="viewport-badge">
        <span class="logo">VX-9</span>
        <span class="subtitle">Phantom Disassembly</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="viewport-hint">Drag to rotate • Scroll to zoom • Click parts to select</div>
      <button id="mobile-toggle">☰</button>
    </div>

    <div id="side-panel">
      <div class="panel-header">
        <div class="panel-title">VX-9 Phantom</div>
        <div class="panel-subtitle">Semi-automatic voxel pistol</div>
      </div>

      <div class="toolbar" id="toolbar">
        <button id="btn-explode">⟶ Explode</button>
        <button id="btn-assemble">⟵ Assemble</button>
        <button id="btn-exploded-view" class="primary">⟶ Explode</button>
        <button id="btn-reset">↺ Reset</button>
        <button id="btn-auto-rotate" class="active">↻ Auto</button>
        <div class="step-nav">
          <button id="btn-step-prev" disabled>◂</button>
          <button id="btn-step-next" disabled>▸</button>
        </div>
      </div>

      <div class="speed-control">
        <span>Speed</span>
        <input type="range" id="speed-slider" min="0.2" max="3" step="0.1" value="1">
        <span id="speed-value">1.0x</span>
      </div>

      <div class="tab-bar">
        <div class="panel-tab active" data-tab="parts">Parts</div>
        <div class="panel-tab" data-tab="steps">Steps</div>
      </div>

      <div class="tab-content" id="tab-parts">
        <div id="parts-list"></div>
      </div>
      <div class="tab-content hidden" id="tab-steps">
        <div id="steps-list"></div>
      </div>
    </div>

    <div id="info-panel">
      <div class="info-title" id="info-title"></div>
      <div class="info-description" id="info-description"></div>
      <div class="info-divider"></div>
      <div class="info-meta" id="info-meta"></div>
      <div class="info-divider"></div>
      <div class="info-actions">
        <button id="info-toggle">Toggle</button>
        <button id="info-focus">Focus</button>
      </div>
    </div>

    <div id="toast-container"></div>
  </div>

</body>
</html>
