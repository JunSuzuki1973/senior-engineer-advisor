<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Assault Rifle - Disassembly Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <div id="title-bar">
            <h1>ASSAULT RIFLE</h1>
            <span class="subtitle">DISASSEMBLY SIMULATOR</span>
        </div>

        <div id="controls">
            <button id="btn-disassemble" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
                Disassemble
            </button>
            <button id="btn-assemble" class="btn btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 5l-7 7 7 7"/>
                </svg>
                Assemble
            </button>
            <button id="btn-reset" class="btn btn-ghost">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 4v6h6M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                </svg>
                Reset
            </button>
        </div>

        <div id="part-label">
            <span id="part-name"></span>
        </div>

        <div id="info-bar">
            <span class="info-item">Drag to Rotate</span>
            <span class="info-sep">|</span>
            <span class="info-item">Scroll to Zoom</span>
            <span class="info-sep">|</span>
            <span class="info-item">Right-Click to Pan</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
