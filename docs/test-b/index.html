<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VX-9 Phantom | Voxel Gun Disassembly Simulator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <div class="logo">
        <span class="logo-icon">◆</span>
        <div>
          <div class="logo-text">VX-9 Phantom</div>
          <div class="logo-sub">Voxel Disassembly Simulator</div>
        </div>
      </div>
      <div class="status">
        <span id="status-text">Ready</span>
        <div class="status-indicator"></div>
      </div>
      <button id="mobile-toggle">☰</button>
    </div>

    <div id="main-content">
      <div id="viewport-container">
        <div id="info-panel">
          <div class="info-title">—</div>
          <div class="info-description">—</div>
          <div class="info-meta">—</div>
        </div>

        <div id="viewport-overlay">
          <button class="view-btn active" id="btn-auto-rotate" title="Toggle auto-rotation">↻ Rotation ON</button>
          <button class="view-btn" id="btn-reset" title="Reset view">⟲ Reset View</button>
        </div>

        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>

      <div id="side-panel">
        <div id="panel-header">
          <span class="panel-icon">⚙</span>
          <h2>Control Panel</h2>
        </div>

        <div id="panel-tabs">
          <button class="panel-tab active" data-tab="parts">Parts</button>
          <button class="panel-tab" data-tab="steps">Steps</button>
          <button class="panel-tab" data-tab="controls">Controls</button>
        </div>

        <div id="panel-content">
          <div id="tab-parts" class="tab-content">
            <div id="parts-list"></div>
          </div>

          <div id="tab-steps" class="tab-content hidden">
            <div id="steps-list"></div>
          </div>

          <div id="tab-controls" class="tab-content hidden">
            <div id="controls-section">
              <div class="control-group">
                <label>Actions</label>
                <div class="btn-row">
                  <button class="action-btn primary" id="btn-exploded-view">⟶ Explode</button>
                </div>
                <div class="btn-row" style="margin-top: 6px;">
                  <button class="action-btn" id="btn-explode">⟶ Disassemble All</button>
                  <button class="action-btn" id="btn-assemble">⟵ Assemble All</button>
                </div>
              </div>

              <div class="control-group">
                <label>Animation Speed</label>
                <div class="speed-control">
                  <input type="range" id="speed-slider" min="0.2" max="3.0" step="0.1" value="1.0">
                  <span class="speed-value" id="speed-value">1.0x</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="gun_model.js"></script>
  <script src="app.js"></script>
</body>
</html>
