<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボクセルモデルガン分解シミュレーター</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .btn {
            background: linear-gradient(145deg, #3a3a5c, #2a2a4c);
            color: #fff;
            border: none;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:hover {
            background: linear-gradient(145deg, #4a4a6c, #3a3a5c);
            transform: translateY(-2px);
        }
        .btn:active { transform: translateY(0); }
        .btn.active { background: linear-gradient(145deg, #5a7a9a, #4a6a8a); }
        #parts-list {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 50, 0.9);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
        }
        #parts-list h3 { margin-bottom: 10px; color: #aaa; }
        .part-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: rgba(60, 60, 80, 0.5);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .part-item:hover { background: rgba(80, 80, 100, 0.7); }
        .part-item.highlighted { background: rgba(100, 150, 200, 0.5); }
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.9);
            padding: 15px 30px;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
        }
        #instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <h1>ボクセルモデルガン分解シミュレーター</h1>
        <button class="btn" id="disassembleBtn">分解</button>
        <button class="btn" id="assembleBtn">組立</button>
        <button class="btn" id="resetBtn">リセット</button>
    </div>
    <div id="parts-list">
        <h3>パーツ一覧</h3>
        <div class="part-item" data-part="barrel">銃身 (Barrel)</div>
        <div class="part-item" data-part="slide">スライド (Slide)</div>
        <div class="part-item" data-part="frame">フレーム (Frame)</div>
        <div class="part-item" data-part="grip">グリップ (Grip)</div>
        <div class="part-item" data-part="trigger">トリガー (Trigger)</div>
        <div class="part-item" data-part="magazine">マガジン (Magazine)</div>
        <div class="part-item" data-part="recoilSpring">リコイルスプリング (Recoil Spring)</div>
    </div>
    <div id="instructions">マウスドラッグで回転 / スクロールでズーム</div>
    <div id="status">状態: 組立済み</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x1a1a2e);
        document.getElementById('container').appendChild(renderer.domElement);

        const parts = {};
        const originalPositions = {};
        const disassembledPositions = {};
        let isDisassembled = false;
        let animating = false;

        const voxelSize = 0.15;

        function createVoxel(x, y, z, color, geometry) {
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, mat);
            mesh.position.set(x * voxelSize, y * voxelSize, z * voxelSize);
            return mesh;
        }

        function createVoxelGroup(voxels, baseColor) {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(voxelSize * 0.95, voxelSize * 0.95, voxelSize * 0.95);
            
            voxels.forEach(v => {
                const colorVariation = 0.9 + Math.random() * 0.2;
                const color = new THREE.Color(baseColor).multiplyScalar(colorVariation);
                group.add(createVoxel(v.x, v.y, v.z, color, geo));
            });
            return group;
        }

        function createBarrel() {
            const voxels = [];
            for (let x = 0; x < 12; x++) {
                for (let y = 0; y < 2; y++) {
                    for (let z = 0; z < 2; z++) {
                        if (x < 2 || (y === 0 || y === 1) && (z === 0 || z === 1)) {
                            voxels.push({x, y, z});
                        }
                    }
                }
            }
            return createVoxelGroup(voxels, 0x2a2a2a);
        }

        function createSlide() {
            const voxels = [];
            for (let x = 0; x < 10; x++) {
                for (let y = 0; y < 3; y++) {
                    for (let z = 0; z < 3; z++) {
                        if (y < 2 || z === 1) {
                            voxels.push({x, y, z});
                        }
                    }
                }
            }
            return createVoxelGroup(voxels, 0x3a3a3a);
        }

        function createFrame() {
            const voxels = [];
            for (let x = 0; x < 8; x++) {
                for (let y = 0; y < 4; y++) {
                    for (let z = 0; z < 3; z++) {
                        if (y > 0 || z === 1) {
                            if (!(x > 5 && y < 2 && z !== 1)) {
                                voxels.push({x, y, z});
                            }
                        }
                    }
                }
            }
            return createVoxelGroup(voxels, 0x4a4a4a);
        }

        function createGrip() {
            const voxels = [];
            for (let x = 0; x < 4; x++) {
                for (let y = 0; y < 6; y++) {
                    for (let z = 0; z < 2; z++) {
                        voxels.push({x, y: -y, z});
                    }
                }
            }
            return createVoxelGroup(voxels, 0x5a3a2a);
        }

        function createTrigger() {
            const voxels = [];
            voxels.push({x: 0, y: 0, z: 0});
            voxels.push({x: 0, y: -1, z: 0});
            voxels.push({x: 1, y: -2, z: 0});
            voxels.push({x: 0, y: -1, z: 1});
            return createVoxelGroup(voxels, 0x6a6a6a);
        }

        function createMagazine() {
            const voxels = [];
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 5; y++) {
                    for (let z = 0; z < 2; z++) {
                        voxels.push({x, y: -y, z});
                    }
                }
            }
            return createVoxelGroup(voxels, 0x2a2a3a);
        }

        function createRecoilSpring() {
            const voxels = [];
            for (let i = 0; i < 6; i++) {
                voxels.push({x: i, y: Math.sin(i * 0.8) * 0.3, z: 0});
            }
            return createVoxelGroup(voxels, 0x8a8a8a);
        }

        function initGun() {
            parts.barrel = createBarrel();
            parts.barrel.position.set(0.9, 0.6, 0);
            
            parts.slide = createSlide();
            parts.slide.position.set(-0.3, 0.5, 0);
            
            parts.frame = createFrame();
            parts.frame.position.set(-0.5, 0.2, 0);
            
            parts.grip = createGrip();
            parts.grip.position.set(-0.4, -0.3, 0.15);
            
            parts.trigger = createTrigger();
            parts.trigger.position.set(0.1, 0, 0.3);
            
            parts.magazine = createMagazine();
            parts.magazine.position.set(-0.3, -0.3, 0.15);
            
            parts.recoilSpring = createRecoilSpring();
            parts.recoilSpring.position.set(-0.2, 0.4, 0.15);
            parts.recoilSpring.rotation.z = Math.PI / 2;

            for (let key in parts) {
                scene.add(parts[key]);
                originalPositions[key] = parts[key].position.clone();
            }

            disassembledPositions.barrel = new THREE.Vector3(2.5, 1.5, 0);
            disassembledPositions.slide = new THREE.Vector3(1.5, 1.5, 0);
            disassembledPositions.frame = new THREE.Vector3(0, 0, 0);
            disassembledPositions.grip = new THREE.Vector3(-1.5, -1.5, 0);
            disassembledPositions.trigger = new THREE.Vector3(0.5, -1.5, 0);
            disassembledPositions.magazine = new THREE.Vector3(-0.5, -1.5, 0);
            disassembledPositions.recoilSpring = new THREE.Vector3(1.5, -1.5, 0);
        }

        const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        
        const light2 = new THREE.DirectionalLight(0x8888ff, 0.3);
        light2.position.set(-5, -5, -5);
        scene.add(light2);
        
        const ambient = new THREE.AmbientLight(0x404050, 0.5);
        scene.add(ambient);

        camera.position.set(3, 2, 4);
        camera.lookAt(0, 0, 0);

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            const radius = camera.position.length();
            const theta = Math.atan2(camera.position.x, camera.position.z) + deltaX * 0.01;
            const phi = Math.acos(camera.position.y / radius) - deltaY * 0.01;
            
            const newPhi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
            
            camera.position.x = radius * Math.sin(newPhi) * Math.sin(theta);
            camera.position.y = radius * Math.cos(newPhi);
            camera.position.z = radius * Math.sin(newPhi) * Math.cos(theta);
            
            camera.lookAt(0, 0, 0);
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('mouseup', () => isDragging = false);
        renderer.domElement.addEventListener('mouseleave', () => isDragging = false);

        renderer.domElement.addEventListener('wheel', (e) => {
            const zoom = e.deltaY > 0 ? 1.1 : 0.9;
            camera.position.multiplyScalar(zoom);
            camera.position.clampLength(2, 15);
        });

        function animatePart(partName, targetPos, duration, delay = 0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const start = parts[partName].position.clone();
                    const startTime = Date.now();
                    
                    function update() {
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        
                        parts[partName].position.lerpVectors(start, targetPos, eased);
                        
                        if (progress < 1) {
                            requestAnimationFrame(update);
                        } else {
                            resolve();
                        }
                    }
                    update();
                }, delay);
            });
        }

        async function disassemble() {
            if (animating || isDisassembled) return;
            animating = true;
            document.getElementById('status').textContent = '状態: 分解中...';
            
            const delay = 200;
            const duration = 600;
            
            await Promise.all([
                animatePart('barrel', disassembledPositions.barrel, duration, 0),
                animatePart('slide', disassembledPositions.slide, duration, delay),
                animatePart('recoilSpring', disassembledPositions.recoilSpring, duration, delay * 2),
                animatePart('magazine', disassembledPositions.magazine, duration, delay * 3),
                animatePart('trigger', disassembledPositions.trigger, duration, delay * 4),
                animatePart('grip', disassembledPositions.grip, duration, delay * 5),
            ]);
            
            isDisassembled = true;
            animating = false;
            document.getElementById('status').textContent = '状態: 分解済み';
        }

        async function assemble() {
            if (animating || !isDisassembled) return;
            animating = true;
            document.getElementById('status').textContent = '状態: 組立中...';
            
            const delay = 200;
            const duration = 600;
            
            await Promise.all([
                animatePart('grip', originalPositions.grip, duration, 0),
                animatePart('trigger', originalPositions.trigger, duration, delay),
                animatePart('magazine', originalPositions.magazine, duration, delay * 2),
                animatePart('recoilSpring', originalPositions.recoilSpring, duration, delay * 3),
                animatePart('slide', originalPositions.slide, duration, delay * 4),
                animatePart('barrel', originalPositions.barrel, duration, delay * 5),
            ]);
            
            isDisassembled = false;
            animating = false;
            document.getElementById('status').textContent = '状態: 組立済み';
        }

        function reset() {
            if (animating) return;
            for (let key in parts) {
                parts[key].position.copy(originalPositions[key]);
            }
            isDisassembled = false;
            document.getElementById('status').textContent = '状態: 組立済み';
        }

        document.getElementById('disassembleBtn').addEventListener('click', disassemble);
        document.getElementById('assembleBtn').addEventListener('click', assemble);
        document.getElementById('resetBtn').addEventListener('click', reset);

        document.querySelectorAll('.part-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                const partName = item.dataset.part;
                if (parts[partName]) {
                    parts[partName].children.forEach(mesh => {
                        mesh.material.emissive = new THREE.Color(0x333333);
                    });
                    item.classList.add('highlighted');
                }
            });
            item.addEventListener('mouseleave', () => {
                const partName = item.dataset.part;
                if (parts[partName]) {
                    parts[partName].children.forEach(mesh => {
                        mesh.material.emissive = new THREE.Color(0x000000);
                    });
                    item.classList.remove('highlighted');
                }
            });
        });

        initGun();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
