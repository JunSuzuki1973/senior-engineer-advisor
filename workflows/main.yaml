# Senior Engineer Advisor - Main Workflow
# Enhanced with Agency Agents and Code Review

name: senior-engineer-advisor
version: 2.0.0
description: Cost-effective coding with advisor strategy, agency specialists, and code review

# Configuration schema
config:
  agent:
    model:
      type: string
      required: true
      description: Cost-effective model for implementation
      examples: ["glm-4.7", "kimi-k2.5", "gpt-4o-mini"]
    provider:
      type: string
      required: true
    api_key:
      type: string
      required: true
      secret: true
  
  advisor:
    # Default general advisor
    general:
      model:
        type: string
        default: "claude-opus-4.7"
      provider:
        type: string
        default: "anthropic"
      api_key:
        type: string
        secret: true
      max_tokens:
        type: integer
        default: 800
    
    # Agency Agents specialists
    agency_agents:
      enabled:
        type: boolean
        default: true
      specialists:
        security:
          model: "claude-opus-4.7"
          description: "Security Architect"
        database:
          model: "claude-opus-4.7"
          description: "Database Expert"
        api:
          model: "claude-opus-4.7"
          description: "API Designer"
        performance:
          model: "claude-opus-4.7"
          description: "Performance Engineer"
        devops:
          model: "claude-opus-4.7"
          description: "DevOps Specialist"
        frontend:
          model: "claude-opus-4.7"
          description: "Frontend Architect"
        backend:
          model: "claude-opus-4.7"
          description: "Backend Architect"
        ml:
          model: "claude-opus-4.7"
          description: "ML Engineer"
  
  code_review:
    enabled:
      type: boolean
      default: true
    trigger_on:
      - "user_dissatisfied"
      - "bug_reported"
      - "high_complexity"
    require_permission:
      type: boolean
      default: true
    reviewer_model:
      type: string
      default: "claude-opus-4.7"
  
  knowledge:
    llm_wiki:
      enabled:
        type: boolean
        default: true
      path:
        type: string
        default: "~/openclaw-wiki"
      auto_save:
        type: boolean
        default: true

# Main workflow
workflow:
  on_task:
    # Step 1: Self-assessment
    - action: evaluate_complexity
      description: "Evaluate task complexity (0.0-1.0)"
      system_prompt: prompts/agent_system.md
      
    # Step 2: Check knowledge base
    - action: search_wiki
      condition: "complexity >= 0.5"
      description: "Search LLM Wiki for similar patterns"
      
    # Step 3: Determine if advisor needed
    - action: route
      branches:
        # Branch A: Wiki has sufficient knowledge
        - condition: "wiki_match.similarity > 0.85"
          action: use_wiki_knowledge
          description: "Reuse existing knowledge"
          
        # Branch B: Need advisor consultation
        - condition: "complexity >= 0.7 OR wiki_match.similarity > 0.6"
          action: advisor_consultation
          description: "Consult appropriate advisor"
          
          substeps:
            # 3a: Assign specialist from Agency Agents
            - action: assign_specialist
              condition: "config.advisor.agency_agents.enabled == true"
              description: "Assign specialist based on task type"
              system_prompt: prompts/agency_assignment.md
              
            # 3b: Consult advisor (general or specialist)
            - action: consult_advisor
              description: "Get architectural guidance"
              system_prompt: prompts/advisor_system.md
              model: "${assigned_specialist.model || config.advisor.general.model}"
              
            # 3c: Implement with guidance
            - action: implement
              description: "Implement with advisor guidance"
              system_prompt: prompts/agent_system.md
              model: "${config.agent.model}"
              
            # 3d: Offer code review
            - action: offer_code_review
              condition: "config.code_review.enabled == true"
              description: "Ask user if they want code review"
              
            # 3e: Code review if requested
            - action: code_review
              condition: "user_requested_review == true"
              description: "Review implementation"
              system_prompt: prompts/code_review.md
              model: "${config.code_review.reviewer_model}"
              
            # 3f: Fix issues if found
            - action: fix_issues
              condition: "review.issues_found == true AND user_approved_fixes == true"
              description: "Fix identified issues"
              
            # 3g: Save to Wiki
            - action: save_pattern
              condition: "config.knowledge.llm_wiki.auto_save == true"
              description: "Save successful pattern to Wiki"
              
        # Branch C: Simple task
        - condition: "complexity < 0.7"
          action: implement_direct
          description: "Implement without advisor"
          system_prompt: prompts/agent_system.md
          model: "${config.agent.model}"
          
          # Simple tasks also get code review option
          substeps:
            - action: offer_code_review
              condition: "config.code_review.enabled == true"
              description: "Ask user if they want code review"

# Post-implementation review triggers
post_implementation:
  on_user_feedback:
    # Triggered when user reports issues
    - trigger: "not_working"
      action: emergency_review
      description: "Urgent code review for bug fix"
      
    - trigger: "needs_improvement"
      action: quality_review
      description: "Improvement-focused review"
      
    - trigger: "satisfied"
      action: save_to_wiki
      description: "Save successful pattern"

# Setup workflow
setup:
  steps:
    - prompt: "Select your cost-effective implementation model:"
      options: ["glm-4.7", "kimi-k2.5", "gpt-4o-mini", "other"]
      config_path: "agent.model"
      
    - prompt: "Select your general advisor model:"
      options: ["claude-opus-4.7", "gpt-5.5", "other"]
      config_path: "advisor.general.model"
      
    - prompt: "Enable Agency Agents specialists?"
      type: boolean
      default: true
      config_path: "advisor.agency_agents.enabled"
      
    - prompt: "Enable code review feature?"
      type: boolean
      default: true
      config_path: "code_review.enabled"
      
    - prompt: "Enter your agent model API key:"
      config_path: "agent.api_key"
      secret: true
      
    - prompt: "Enter your advisor model API key:"
      config_path: "advisor.general.api_key"
      secret: true
      
    - prompt: "LLM Wiki path:"
      default: "~/openclaw-wiki"
      config_path: "knowledge.llm_wiki.path"

# CLI integrations
integrations:
  opencode:
    pre_prompt: prompts/agent_system.md
    wrap_commands: true
    
  claude-code:
    pre_prompt: prompts/agent_system.md
    auto_apply: true
    
  kilo:
    pre_prompt: prompts/agent_system.md
    model_override: "${config.agent.model}"
